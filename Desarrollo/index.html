<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>proyecto-integrador-1</title>
</head>
<body>
    <header>TITULO</header>
    <main>
        <section>
            <h2>Tipo de color</h2>
            <ul>
                <li><input type="checkbox" id="rgbaColors"><label for="rgbaColors">RGBA</label></li>
                <li><input type="checkbox" id="hslColors"><label for="hslColors">HSL</label></li>
            </ul>
            <h2>Cantidad de colores</h2>
            <ul>
                <li><input type="checkbox" id="sixColors"><label for="sixColors">6</label></li>
                <li><input type="checkbox" id="eightColors"><label for="eightColors">8</label></li>
                <li><input type="checkbox" id="nineColors"><label for="nineColors">9</label></li>
            </ul>
            <button type="button" id="generateColors">Generar Colores</button>
        </section>
        <section id="color-container" class="color-container"></section>
    </main>
    <script src="js/scripts.js"></script>
</body>
</html>
